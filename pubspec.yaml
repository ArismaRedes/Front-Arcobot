name: front_arcobot
description: Frontend app for ArcoBot.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.8.0+1
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  logto_dart_sdk: ^3.0.0
  flutter_svg: ^2.0.10+1
  mobile_scanner: ^5.2.3
  lottie: ^3.3.2
  shared_preferences: ^2.5.3
  crypto: ^3.0.6
  http: ^1.5.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/auth/
    - assets/images/brand/
    - assets/images/dashboard/
